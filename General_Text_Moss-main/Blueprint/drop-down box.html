<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一比一复刻 - 高级美化版</title>
    <style>
        /* === 1. 定义全局 CSS 变量，方便统一管理和后续扩展 === */
        :root {
            --bg-body: #191919;
            --bg-menu: #252525;
            --bg-hover: rgba(255, 255, 255, 0.06);
            --border-menu: rgba(255, 255, 255, 0.08);
            --border-item-hover: rgba(255, 255, 255, 0.1);
            
            --text-main: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.45);
            --icon-color: rgba(255, 255, 255, 0.85);
            
            --radius-menu: 8px;
            --radius-item: 5px;
            
            /* 现代多层阴影，立体感更强 */
            --shadow-menu: 0 0 0 1px var(--border-menu), 
                           0 4px 12px -2px rgba(0, 0, 0, 0.4), 
                           0 12px 32px -4px rgba(0, 0, 0, 0.3);
        }

        /* === 2. 基础重置与排版 === */
        body {
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased; /* 字体抗锯齿，更清晰 */
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        .trigger-container {
            position: relative;
        }

        .trigger-button {
            background-color: var(--bg-menu);
            border: 1px solid var(--border-menu);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: var(--radius-item);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: background-color 0.15s, border-color 0.15s;
        }

        .trigger-button:hover {
            background-color: #2a2a2a;
            border-color: rgba(255,255,255,0.15);
        }

        /* === 3. 下拉菜单主体 (加入平滑动画) === */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            width: 240px;
            background-color: var(--bg-menu);
            border-radius: var(--radius-menu);
            box-shadow: var(--shadow-menu);
            padding: 6px 0;
            z-index: 1000;
            user-select: none;
            
            /* 动画相关属性 */
            opacity: 0;
            visibility: hidden;
            transform: scale(0.97) translateY(-4px); /* 初始状态：稍微缩小并上移 */
            transform-origin: top left;
            transition: opacity 0.15s cubic-bezier(0.2, 0, 0.2, 1), 
                        transform 0.15s cubic-bezier(0.2, 0, 0.2, 1),
                        visibility 0.15s;
        }

        /* 展开状态 */
        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0); /* 还原真实大小和位置 */
        }

        /* === 4. 菜单内部元素排版 === */
        .menu-header {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 2px 12px 6px 12px;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 5px 8px;
            margin: 1px 6px; /* 圆角块留白 */
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            border-radius: var(--radius-item);
            border: 1px solid transparent;
            transition: background-color 0.1s ease, border-color 0.1s ease, transform 0.05s ease;
        }

        /* 悬停、高亮及点击反馈 */
        .menu-item:hover, .menu-item.active {
            background-color: var(--bg-hover);
            border-color: var(--border-item-hover);
        }

        .menu-item:active {
            transform: scale(0.98); /* 细腻的点击下凹感 */
        }

        .menu-icon {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .menu-icon svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.85;
        }

        .menu-item:hover .menu-icon svg, .menu-item.active .menu-icon svg {
            opacity: 1; /* 悬停时图标微亮 */
        }

        .menu-shortcuts {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 11px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            letter-spacing: 0.5px; /* 让快捷键字母稍微拉开一点，更清晰 */
        }

        .menu-divider {
            height: 1px;
            background-color: var(--border-menu);
            margin: 4px 0;
        }

        .menu-footer {
            padding: 4px 12px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="trigger-container">
        <button id="menu-trigger" class="trigger-button">操作菜单</button>

        <div id="dropdown-menu" class="dropdown-menu">
            <div class="menu-header">页面</div>
            
            <ul class="menu-list">
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    </span>
                    添加到最爱
                </li>
                <li class="menu-item active">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    </span>
                    拷贝链接
                </li>
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </span>
                    创建副本
                    <span class="menu-shortcuts">Ctrl+D</span>
                </li>
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </span>
                    重命名
                    <span class="menu-shortcuts">Ctrl+⇧+R</span>
                </li>
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><polyline points="9 10 4 15 9 20"></polyline><path d="M20 4v7a4 4 0 0 1-4 4H4"></path></svg>
                    </span>
                    移动到
                    <span class="menu-shortcuts">Ctrl+⇧+P</span>
                </li>
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </span>
                    移至垃圾箱
                </li>
            </ul>

            <div class="menu-divider"></div>

            <ul class="menu-list">
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 23l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                    </span>
                    转换为 Wikis 百科
                </li>
            </ul>

            <div class="menu-divider"></div>

            <ul class="menu-list">
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    </span>
                    在新选项卡中打开
                    <span class="menu-shortcuts">Ctrl+⇧+↵</span>
                </li>
                <li class="menu-item">
                    <span class="menu-icon">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="15" y1="3" x2="15" y2="21"></line></svg>
                    </span>
                    在侧边预览中打开
                    <span class="menu-shortcuts">Alt+Click</span>
                </li>
            </ul>

            <div class="menu-divider"></div>

            <div class="menu-footer">
                <div>上次由 一人 成圣 编辑</div>
                <div>今天 15:43</div>
            </div>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('menu-trigger');
        const menu = document.getElementById('dropdown-menu');
        
        // 使用状态变量防止动画冲突
        let isMenuOpen = false;

        trigger.addEventListener('click', function(event) {
            event.stopPropagation();
            isMenuOpen = !isMenuOpen;
            if(isMenuOpen) {
                menu.classList.add('show');
            } else {
                menu.classList.remove('show');
            }
        });

        document.addEventListener('click', function(event) {
            if (isMenuOpen && !menu.contains(event.target) && event.target !== trigger) {
                menu.classList.remove('show');
                isMenuOpen = false;
            }
        });
    </script>
</body>
</html>
