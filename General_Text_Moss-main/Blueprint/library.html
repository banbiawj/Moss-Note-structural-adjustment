<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moss - 笔记空间 (完整功能版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">

    <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
      }
    }
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        serif: ['Noto Serif SC', 'serif'] 
                    },
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #171717; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease, transform 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(4px); }
        
        .overlay-fade-enter-active, .overlay-fade-leave-active { transition: opacity 0.3s ease; }
        .overlay-fade-enter-from, .overlay-fade-leave-to { opacity: 0; }

        .slide-down-enter-active, .slide-down-leave-active { transition: all 0.2s ease-out; overflow: hidden; max-height: 50px; opacity: 1; }
        .slide-down-enter-from, .slide-down-leave-to { max-height: 0; opacity: 0; margin-bottom: 0 !important; }

        .masonry-grid {
            column-count: 1;
            column-gap: 1.25rem;
        }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1536px) { .masonry-grid { column-count: 4; } }

        .list-layout {
            display: flex;
            flex-direction: column;
            max-width: 48rem;
            margin: 0 auto;
        }

        .note-item {
            break-inside: avoid;
            page-break-inside: avoid;
            margin-bottom: 1.25rem;
            transition: all 0.3s ease;
        }
        
        .note-item:hover {
            border-color: #d4d4d4;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .line-clamp-custom {
            display: -webkit-box;
            -webkit-line-clamp: 8; 
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden selection:bg-black selection:text-white flex text-[15px]">

<div id="app" class="h-full w-full flex bg-[#fafafa] relative">

    <!-- 移动端侧边栏背景遮罩 -->
    <transition name="overlay-fade">
        <div v-if="isSidebarOpen && isMobile" 
             class="fixed inset-0 bg-black/20 backdrop-blur-[2px] z-40 md:hidden"
             @click="toggleSidebar">
        </div>
    </transition>

    <!-- 左侧导航侧边栏 -->
    <aside :class="[
        'fixed md:relative inset-y-0 left-0 z-50 w-64 bg-[#fafafa] border-r border-gray-200 flex-shrink-0 flex flex-col h-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]',
        isSidebarOpen ? 'translate-x-0 shadow-2xl md:shadow-none' : '-translate-x-full md:translate-x-0 md:-ml-64'
    ]">
        <div class="p-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 rounded-md bg-black flex items-center justify-center shadow-sm">
                    <i class="fa-solid fa-asterisk text-white text-[10px]"></i>
                </div>
                <span class="font-semibold text-sm tracking-wide text-gray-800">moss notes</span>
            </div>
            <button v-if="isMobile" @click="toggleSidebar" class="w-8 h-8 flex items-center justify-center rounded-md hover:bg-gray-200 text-gray-500 transition">
                <i class="fa-solid fa-xmark text-sm"></i>
            </button>
        </div>

        <div class="px-3 pb-4">
            <button class="w-full bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 text-sm py-2 rounded-lg transition shadow-sm flex items-center justify-center gap-2 transform active:scale-95">
                <i class="fa-solid fa-pen-nib text-xs"></i>
                新建速记
            </button>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar px-3 py-2">
            <div class="text-xs font-semibold text-gray-400 mb-2 px-2 uppercase tracking-wider">视图</div>
            <ul class="space-y-0.5 mb-6">
                <li>
                    <a href="#" @click.prevent="selectContext('全部笔记')" 
                       :class="currentContext === '全部笔记' ? 'bg-black/5 text-black' : 'hover:bg-black/5 text-gray-600'"
                       class="flex items-center gap-3 px-2 py-1.5 rounded-md font-medium text-sm transition">
                        <i class="fa-regular fa-file-lines text-gray-500 w-4 text-center"></i> 全部笔记
                    </a>
                </li>
                <li>
                    <a href="#" @click.prevent="selectContext('星标笔记')"
                       :class="currentContext === '星标笔记' ? 'bg-black/5 text-black' : 'hover:bg-black/5 text-gray-600'"
                       class="flex items-center gap-3 px-2 py-1.5 rounded-md font-medium text-sm transition">
                        <i class="fa-regular fa-star text-gray-400 w-4 text-center"></i> 星标
                    </a>
                </li>
            </ul>

            <div class="text-xs font-semibold text-gray-400 mb-2 px-2 uppercase tracking-wider flex justify-between items-center group/header">
                <span>笔记本</span>
                <!-- 新增笔记本触发按钮 -->
                <button @click="startCreatingFolder" class="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-200 text-gray-400 hover:text-black transition-colors" title="新建笔记本">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            
            <!-- 新建笔记本内联输入框 -->
            <transition name="slide-down">
                <div v-if="isCreatingFolder" class="px-2 mb-1 mt-1">
                    <div class="relative flex items-center">
                        <i class="fa-regular fa-folder text-gray-400 absolute left-2 text-sm"></i>
                        <input ref="newFolderInputRef" 
                               v-model="newFolderName" 
                               @keyup.enter="saveNewFolder" 
                               @keyup.esc="cancelCreatingFolder" 
                               @blur="saveNewFolder"
                               type="text" 
                               placeholder="笔记本名称..." 
                               class="w-full bg-white border border-gray-300 rounded-md py-1.5 pl-7 pr-2 text-sm text-gray-800 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 shadow-sm transition-all placeholder-gray-300">
                    </div>
                </div>
            </transition>

            <ul class="space-y-0.5 mt-1">
                <li v-for="folder in folders" :key="folder.id">
                    <a href="#" @click.prevent="selectContext(folder.name)"
                       :class="currentContext === folder.name ? 'bg-black/5 text-black' : 'hover:bg-black/5 text-gray-600'"
                       class="flex items-center justify-between px-2 py-1.5 rounded-md text-sm transition group">
                        <div class="flex items-center gap-3 min-w-0">
                            <i :class="currentContext === folder.name ? 'fa-solid text-gray-800' : 'fa-regular text-gray-400'" class="fa-folder w-4 text-center shrink-0 transition-colors"></i>
                            <span class="truncate font-medium">{{ folder.name }}</span>
                        </div>
                        <span class="text-xs text-gray-400 opacity-0 group-hover:opacity-100 transition shrink-0 pl-2">{{ folder.count }}</span>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <!-- 右侧主体内容区 -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-white md:rounded-l-2xl shadow-[-5px_0_30px_rgba(0,0,0,0.02)] border-l border-gray-100 z-10 transition-all duration-500 min-w-0">
        
        <!-- 顶部搜索与控制栏 -->
        <header class="h-16 px-4 md:px-8 flex items-center justify-between border-b border-gray-50 bg-white/80 backdrop-blur-md sticky top-0 z-20 gap-2 md:gap-4 transition-all">
            <div class="flex items-center gap-2 md:gap-4 flex-1 min-w-0">
                <button @click="toggleSidebar" 
                        class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-500 hover:text-black transition-colors shrink-0"
                        title="切换侧边栏">
                    <i class="fa-solid fa-bars-staggered text-sm"></i>
                </button>
                
                <!-- 上下文/面包屑指示器 -->
                <div class="flex items-center gap-2 text-sm shrink-0 whitespace-nowrap pl-1 pr-2">
                    <span class="text-gray-300 hidden sm:inline">/</span>
                    <span class="font-semibold text-gray-800 tracking-wide flex items-center gap-2">
                        <i v-if="currentContext === '全部笔记'" class="fa-regular fa-file-lines text-gray-400 hidden sm:inline"></i>
                        <i v-else-if="currentContext === '星标笔记'" class="fa-regular fa-star text-amber-400 hidden sm:inline"></i>
                        <i v-else class="fa-solid fa-folder text-gray-300 hidden sm:inline"></i>
                        {{ currentContext }}
                    </span>
                </div>

                <!-- 响应式搜索框 -->
                <div class="flex items-center gap-2 md:gap-3 flex-1 max-w-md bg-gray-50/60 md:bg-transparent px-3 py-1.5 md:p-0 rounded-lg border border-transparent md:border-none focus-within:bg-white focus-within:border-gray-200 focus-within:shadow-sm md:focus-within:shadow-none transition-all group ml-auto md:ml-0">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm shrink-0 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="text" placeholder="搜索..." class="w-full bg-transparent border-none outline-none text-[14px] md:text-sm text-gray-800 placeholder-gray-400 font-light min-w-0">
                </div>
            </div>

            <div class="flex items-center gap-1 md:gap-3 text-gray-400 shrink-0">
                <!-- 视图切换按钮 -->
                <button @click="toggleViewMode" 
                        class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-gray-100 hover:text-black transition-colors" 
                        :title="viewMode === 'grid' ? '切换为列表视图' : '切换为网格视图'">
                    <i :class="viewMode === 'grid' ? 'fa-solid fa-list-ul' : 'fa-solid fa-border-all'" class="text-sm"></i>
                </button>
                <button class="hidden sm:flex w-9 h-9 items-center justify-center rounded-lg hover:bg-gray-100 hover:text-black transition-colors" title="排序">
                    <i class="fa-solid fa-arrow-down-wide-short text-sm"></i>
                </button>
            </div>
        </header>

        <!-- 笔记画布区 -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8 no-scrollbar scroll-smooth bg-[#fcfcfc]">
            <div class="max-w-7xl mx-auto h-full">
                
                <transition name="fade" mode="out-in">
                    <!-- 根据选择的上下文过滤展示笔记 -->
                    <div v-if="filteredNotes.length > 0" :key="viewMode + currentContext" :class="viewMode === 'grid' ? 'masonry-grid' : 'list-layout'">
                        
                        <!-- 笔记块渲染 -->
                        <div v-for="note in filteredNotes" :key="note.id" 
                             class="note-item bg-white border border-gray-200/80 rounded-xl p-4 md:p-5 cursor-text group relative">
                            
                            <div class="absolute top-3 right-3 md:top-4 md:right-4 opacity-0 group-hover:opacity-100 transition-opacity flex gap-1.5 md:gap-2 bg-white/90 backdrop-blur-sm px-1.5 py-1 rounded-md shadow-sm border border-gray-100 z-10">
                                <button class="text-gray-400 hover:text-amber-500 transition w-6 h-6 flex items-center justify-center rounded hover:bg-gray-50"><i class="fa-regular fa-star text-xs"></i></button>
                                <button class="text-gray-400 hover:text-black transition w-6 h-6 flex items-center justify-center rounded hover:bg-gray-50"><i class="fa-solid fa-ellipsis text-xs"></i></button>
                            </div>

                            <h3 v-if="note.title" class="font-medium text-gray-900 text-[15px] md:text-base mb-2 md:mb-3 pr-10 leading-snug">
                                {{ note.title }}
                            </h3>

                            <div class="text-gray-600 text-[13px] md:text-[14px] leading-relaxed line-clamp-custom font-light whitespace-pre-wrap"
                                 :class="{ 'font-serif': note.useSerif }">{{ note.content }}</div>
                            
                            <div v-if="note.codeSnippet" class="mt-3 bg-gray-50 border border-gray-100 rounded-lg p-3 overflow-hidden">
                                <code class="text-[11px] md:text-[12px] font-mono text-gray-700 whitespace-pre-wrap">{{ note.codeSnippet }}</code>
                            </div>

                            <div class="mt-4 pt-3 text-[10px] md:text-[11px] text-gray-400 font-medium tracking-wide flex justify-between items-center border-t border-gray-50/50">
                                <span>{{ note.date }}</span>
                                <span v-if="note.folder" class="bg-gray-50 px-2 py-1 rounded text-gray-500 truncate max-w-[120px]">{{ note.folder }}</span>
                            </div>
                        </div>

                    </div>

                    <!-- 空状态提示 -->
                    <div v-else :key="'empty' + currentContext" class="h-full flex flex-col items-center justify-center text-gray-400">
                        <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center border border-gray-100 mb-4">
                            <i class="fa-regular fa-folder-open text-2xl text-gray-300"></i>
                        </div>
                        <p class="text-[15px] font-medium text-gray-600">空空如也</p>
                        <p class="text-sm mt-1">目前 {{ currentContext }} 下还没有笔记</p>
                        <!-- 当在某个空文件夹时，提供快速新建按钮 -->
                        <button v-if="currentContext !== '全部笔记' && currentContext !== '星标笔记'" class="mt-6 px-5 py-2 bg-black text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition shadow-sm flex items-center gap-2">
                            <i class="fa-solid fa-pen-nib text-xs"></i> 记点什么
                        </button>
                    </div>
                </transition>

            </div>
        </div>
    </main>

</div>

<script type="module">
    import { createApp, ref, computed, onMounted, onUnmounted, nextTick } from 'vue';

    createApp({
        setup() {
            const isSidebarOpen = ref(true);
            const isMobile = ref(false);
            const viewMode = ref('grid');
            const currentContext = ref('全部笔记');

            // 新建文件夹相关状态
            const isCreatingFolder = ref(false);
            const newFolderName = ref('');
            const newFolderInputRef = ref(null);

            const checkScreenSize = () => {
                const wasMobile = isMobile.value;
                isMobile.value = window.innerWidth < 768; 
                
                if (wasMobile !== isMobile.value) {
                    isSidebarOpen.value = !isMobile.value; 
                }
            };

            const toggleSidebar = () => {
                isSidebarOpen.value = !isSidebarOpen.value;
            };

            const toggleViewMode = () => {
                viewMode.value = viewMode.value === 'grid' ? 'list' : 'grid';
            };

            const selectContext = (contextName) => {
                currentContext.value = contextName;
                if (isMobile.value) {
                    isSidebarOpen.value = false;
                }
            };

            // 新增：开始创建文件夹
            const startCreatingFolder = async () => {
                isCreatingFolder.value = true;
                newFolderName.value = '';
                await nextTick();
                if (newFolderInputRef.value) {
                    newFolderInputRef.value.focus();
                }
            };

            // 新增：保存新文件夹
            const saveNewFolder = () => {
                const name = newFolderName.value.trim();
                // 仅当名称不为空且不存在重名时才创建
                if (name) {
                    const exists = folders.value.find(f => f.name === name);
                    if (!exists) {
                        folders.value.unshift({ // 添加到列表顶部
                            id: Date.now(), 
                            name: name, 
                            count: 0 
                        });
                        selectContext(name); // 创建后自动跳转到该笔记本
                    }
                }
                // 无论是否成功创建，都关闭输入框并清空内容
                isCreatingFolder.value = false;
                newFolderName.value = '';
            };

            // 新增：取消创建文件夹
            const cancelCreatingFolder = () => {
                isCreatingFolder.value = false;
                newFolderName.value = '';
            };

            onMounted(() => {
                checkScreenSize();
                if (window.innerWidth < 768) {
                    isSidebarOpen.value = false;
                }
                window.addEventListener('resize', checkScreenSize);
            });

            onUnmounted(() => {
                window.removeEventListener('resize', checkScreenSize);
            });

            const folders = ref([
                { id: 1, name: '毕业论文随笔', count: 2 },
                { id: 2, name: '项目：Agent 架构', count: 2 },
                { id: 3, name: 'Moss 简历工具', count: 1 },
                { id: 4, name: '面试复盘区', count: 1 }
            ]);

            const notes = ref([
                {
                    id: 'n1',
                    title: '毕业论文：引言与背景大纲梳理',
                    content: '正在使用 codex CLI 协助我，根据已经写好的项目代码来推导论点。\n\n目前的重心在于说明：将 agent 接入后端其实没有想象的那么难，难点在于上下文的记忆保留和复杂意图的解析。在接下来的半个月冲刺里，必须完成初稿。',
                    date: 'May 11, 2026',
                    folder: '毕业论文随笔',
                    useSerif: false
                },
                {
                    id: 'n2',
                    title: '',
                    content: '刚才测试了本地文件共享，非常方便的单行命令记录一下，免得忘了。跑起来之后直接内网穿透就可以看效果。',
                    codeSnippet: 'python -m http.server 8000\nServing HTTP on :: port 8000',
                    date: 'May 10, 2026',
                    folder: null,
                    useSerif: false
                },
                {
                    id: 'n3',
                    title: 'Moss 项目的快捷键规划',
                    content: '昨天把基础的 HTML 结构换成了 tiptap，体验好很多。\n去除了冗余的导出 PDF 功能，这不该是网页端的核心。加入了快捷键体系：\n- 唤起 AI 悬浮窗：Ctrl+/\n- 重做：Ctrl+Y\n- 全屏沉浸模式：Ctrl+Shift+F\n\n核心技术栈定格在 FastAPI + LangGraph，RAG 库的处理逻辑还需要再打磨一下前端的反馈状态。',
                    date: 'May 8, 2026',
                    folder: 'Moss 简历工具',
                    useSerif: true 
                },
                {
                    id: 'n4',
                    title: '关于 Agent 记忆机制的底层思考',
                    content: '我现在在学习 Agent 记忆相关的知识，必须从底层开始建立认知框架：\n\n1. 工作记忆 (Working Memory)：处理当前任务的上下文。\n2. 情景记忆 (Episodic Memory)：过去交互的历史回溯。\n3. 语义记忆 (Semantic Memory)：提取的客观事实和偏好。\n4. 感知记忆 (Sensory Memory)：多模态的瞬时输入。\n\n看了 mem0 的文档，它似乎默认走的是远端 key 存储，需要查一下它具体的本地存储方案怎么实现最优雅。',
                    date: 'May 5, 2026',
                    folder: '项目：Agent 架构',
                    useSerif: true
                },
                {
                    id: 'n5',
                    title: '浏览器插件 Agent 构想',
                    content: '想法：做一个浏览器的插件形态的 agent，核心是通过它直接接管 DOM，帮助用户针对当前页面自动完成复杂的表单或任务。\n思考题：Chrome-DevTools-MCP 协议是不是解决这个问题的关键？它是在 Chrome-DevTools 的基础上加入给 agent 调用的能力吗？需要深挖一下这个协议的底层 API。',
                    date: 'May 2, 2026',
                    folder: '项目：Agent 架构',
                    useSerif: false
                },
                {
                    id: 'n6',
                    title: '面试准备要点',
                    content: '明天有几个 Python Developer 岗位的面试，需要再回顾一下几个核心概念：\n\n- MySQL 索引原理（特别是联合索引优化的边界条件）\n- 熟练表达之前用 Django / DRF / Flask / FastAPI 构建 RESTful API 的对比思路\n- UV 包管理器：一定要提到这个！相比原生的 venv，uv 的速度确实快得惊人，这能体现对现代构建工具的关注。',
                    date: 'Apr 28, 2026',
                    folder: '面试复盘区',
                    useSerif: false
                }
            ]);

            const filteredNotes = computed(() => {
                if (currentContext.value === '全部笔记') {
                    return notes.value;
                } else if (currentContext.value === '星标笔记') {
                    return []; 
                } else {
                    return notes.value.filter(note => note.folder === currentContext.value);
                }
            });

            return { 
                folders, notes, viewMode, toggleViewMode, 
                isSidebarOpen, isMobile, toggleSidebar,
                currentContext, selectContext, filteredNotes,
                isCreatingFolder, newFolderName, newFolderInputRef, 
                startCreatingFolder, saveNewFolder, cancelCreatingFolder
            };
        }
    }).mount('#app');
</script>
</body>
</html>
