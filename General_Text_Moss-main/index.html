                showConversationTree.value = true;
                await nextTick();
                updateConversationTreePosition();
                if (isConversationTreeCompact.value) closeConversationTree();
            };

            const loadNoteConversations = async () => {
                if (!currentNoteId.value) {
                    noteConversations.value = [];
                    return;
                }
                isLoadingConversations.value = true;
                conversationError.value = '';
                try {
                    const response = await fetch(apiUrl(`/api/v1/notes/${encodeURIComponent(currentNoteId.value)}/conversations`));
                    if (!response.ok) throw new Error(await response.text());
                    const payload = await response.json();
                    noteConversations.value = (payload.conversations || []).map(normalizeConversation);
                    if (
                        openConversationMenuId.value &&
                        !noteConversations.value.some(item => item.conversation_id === openConversationMenuId.value)
                    ) {
                        closeConversationMenu();
                    }
                    if (!currentConversationId.value && payload.active_conversation_id) {
                        setCurrentConversationId(payload.active_conversation_id);
                        syncNoteUrl();
                    }
                } catch (error) {
                    conversationError.value = error.message || 'Failed to load discussions';
                } finally {
                    isLoadingConversations.value = false;
                }
            };

            const loadConversationMessages = async () => {
                if (!currentNoteId.value || !currentConversationId.value) {
                    messages.value = defaultMessages();
                    return;
                }
                const response = await fetch(apiUrl(`/api/v1/notes/${encodeURIComponent(currentNoteId.value)}/conversations/${encodeURIComponent(currentConversationId.value)}/messages`));
                if (!response.ok) throw new Error(await response.text());
                const payload = await response.json();
                const history = Array.isArray(payload.messages) ? payload.messages : [];
                messages.value = history.length ? history.map(normalizeMessage) : defaultMessages();
                await nextTick();
                scrollToBottom();
            };

            const createConversation = async () => {
                if (isCreatingConversation.value) return;
                closeConversationMenu();
                isCreatingConversation.value = true;
                conversationError.value = '';
                try {
                    await flushAutosave();
                    if (!currentNoteId.value) {
                        await ensurePersistedNote(contentHTML.value, { allowBlank: true });
                    }
                    const response = await fetch(apiUrl(`/api/v1/notes/${encodeURIComponent(currentNoteId.value)}/conversations`), {
                        method: 'POST'
                    });
                    if (!response.ok) throw new Error(await response.text());
                    const conversation = normalizeConversation(await response.json());
                    setCurrentConversationId(conversation.conversation_id);
                    syncNoteUrl();
                    noteConversations.value = [
                        ...noteConversations.value.filter(item => item.conversation_id !== conversation.conversation_id),
                        conversation
                    ];
                    await loadConversationMessages();
                    await loadNoteConversations();
                } catch (error) {
                    conversationError.value = error.message || 'Failed to create discussion';
                } finally {
                    isCreatingConversation.value = false;
                }
            };

            const switchConversation = async (conversation) => {
                const nextConversationId = conversation?.conversation_id || '';
                if (
                    !nextConversationId ||
                    nextConversationId === currentConversationId.value ||
                    isModifying.value ||
                    editingConversationId.value
                ) return;
                const previousConversationId = currentConversationId.value;
                closeConversationMenu();
                conversationError.value = '';
                try {
                    await flushAutosave();
                    setCurrentConversationId(nextConversationId);
                    syncNoteUrl();
                    await loadConversationMessages();
                    await loadNoteConversations();
                } catch (error) {
                    conversationError.value = error.message || 'Failed to switch discussion';
                    if (previousConversationId) {
                        setCurrentConversationId(previousConversationId);
                        syncNoteUrl();
                        await loadConversationMessages().catch(() => {});
                    }
                }
            };

            const startRenameConversation = (conversation) => {
                if (isModifying.value || isRenamingConversation.value) return;
                closeConversationMenu();
                editingConversationId.value = conversation?.conversation_id || '';
                renameConversationDraft.value = conversationTitle(conversation);
                nextTick(() => {
                    const input = conversationTreePanelRef.value?.querySelector?.('[data-conversation-rename-input]');
                    input?.focus?.();
                    input?.select?.();
                });
            };

            const cancelRenameConversation = () => {
                editingConversationId.value = '';
                renameConversationDraft.value = '';
                conversationError.value = '';
            };

            const saveConversationTitle = async (conversation) => {
                if (!conversation?.conversation_id || isRenamingConversation.value) return;
                if (editingConversationId.value !== conversation.conversation_id) return;
                const title = renameConversationDraft.value.trim();
                if (!title) {
                    cancelRenameConversation();
                    return;
                }
                if (title === conversationTitle(conversation)) {
                    cancelRenameConversation();
                    return;
                }
                isRenamingConversation.value = true;
                conversationError.value = '';
                try {
                    const response = await fetch(
                        apiUrl(`/api/v1/notes/${encodeURIComponent(currentNoteId.value)}/conversations/${encodeURIComponent(conversation.conversation_id)}`),
                        {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title })
                        }
                    );
                    if (!response.ok) throw new Error(await response.text());
                    const renamed = normalizeConversation(await response.json());
                    noteConversations.value = noteConversations.value.map(item =>
                        item.conversation_id === renamed.conversation_id ? renamed : item
                    );
                    cancelRenameConversation();
                    await loadNoteConversations();
                } catch (error) {
                    conversationError.value = error.message || 'Failed to rename discussion';
                } finally {
                    isRenamingConversation.value = false;
                }
            };

            const toggleConversationPinned = async (conversation) => {
                if (!conversation?.conversation_id || isConversationActionBusy.value) return;
                isConversationActionBusy.value = true;
                conversationError.value = '';
                try {
                    const response = await fetch(
                        apiUrl(`/api/v1/notes/${encodeURIComponent(currentNoteId.value)}/conversations/${encodeURIComponent(conversation.conversation_id)}`),
                        {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ pinned: !conversation.pinned_at })
                        }
                    );
                    if (!response.ok) throw new Error(await response.text());
                    const updated = normalizeConversation(await response.json());
                    noteConversations.value = noteConversations.value.map(item =>
                        item.conversation_id === updated.conversation_id ? updated : item
                    );
                    closeConversationMenu();
                    await loadNoteConversations();
                } catch (error) {
                    conversationError.value = error.message || 'Failed to update discussion';
                } finally {
                    isConversationActionBusy.value = false;
                }
            };

            const startDeleteConversation = (conversation) => {
                if (!conversation?.conversation_id || conversation.is_default || isConversationActionBusy.value) return;
                closeConversationMenu();
                deleteConversationTarget.value = conversation;
            };

            const cancelDeleteConversation = () => {
                deleteConversationTarget.value = null;
            };

            const confirmDeleteConversation = async () => {
                const conversation = deleteConversationTarget.value;
                if (!conversation?.conversation_id || conversation.is_default || isConversationActionBusy.value) return;
                isConversationActionBusy.value = true;
                conversationError.value = '';
                try {
                    const response = await fetch(
                        apiUrl(`/api/v1/notes/${encodeURIComponent(currentNoteId.value)}/conversations/${encodeURIComponent(conversation.conversation_id)}`),
                        { method: 'DELETE' }
                    );
                    if (!response.ok) throw new Error(await response.text());
                    const deletedId = conversation.conversation_id;
                    noteConversations.value = noteConversations.value.filter(item => item.conversation_id !== deletedId);
                    cancelDeleteConversation();
                    if (currentConversationId.value === deletedId) {
                        const fallback = noteConversations.value.find(item => item.is_default) || noteConversations.value[0];
                        if (fallback) {
                            setCurrentConversationId(fallback.conversation_id);
                            syncNoteUrl();
                            await loadConversationMessages();
                        }
                    }
                    await loadNoteConversations();
                } catch (error) {
                    conversationError.value = error.message || 'Failed to delete discussion';
                } finally {
                    isConversationActionBusy.value = false;
                }
            };

            const isBlankSnapshot = (html) => {
                const holder = document.createElement('div');
                holder.innerHTML = html || '';
                const text = (holder.textContent || '').replace(/\u00a0/g, ' ').trim();
                if (text) return false;
                return !holder.querySelector('img, video, audio, iframe, table, hr, pre, code');
            };

            const ensurePersistedNote = async (snapshot = '', { allowBlank = false } = {}) => {
                if (currentNoteId.value && currentConversationId.value) return true;
                if (!allowBlank && isBlankSnapshot(snapshot)) return false;
                await createNote();
                return true;
            };

            const persistNoteSnapshot = async ({ immediate = false } = {}) => {
                if (!tiptapEditor) return;
                contentHTML.value = tiptapEditor.getHTML();
                if (!(await ensurePersistedNote(contentHTML.value))) return;
                if (contentHTML.value === lastSavedSnapshot) return;
                saveStatus.value = 'saving';
                const response = await fetch(apiUrl(`/api/v1/notes/${encodeURIComponent(currentNoteId.value)}/snapshot`), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ canvas_snapshot: contentHTML.value })
                });
                if (!response.ok) {
                    saveStatus.value = 'error';
                    throw new Error(await response.text());
                }
                const saved = await response.json();
                lastSavedSnapshot = contentHTML.value;
                documentTitle.value = currentNoteDisplayTitle.value || saved.title || documentTitle.value;
                saveStatus.value = 'saved';
            };

            const queueAutosave = () => {
                if (autosaveTimer) window.clearTimeout(autosaveTimer);
                autosaveTimer = window.setTimeout(() => {
                    autosaveTimer = null;
                    persistNoteSnapshot().catch(() => {});
                }, 1200);
            };

            const flushAutosave = async () => {
                if (autosaveTimer) {
                    window.clearTimeout(autosaveTimer);
                    autosaveTimer = null;
                }
                await persistNoteSnapshot({ immediate: true });
            };

            const saveContent = async () => {
                if (isSaving.value) return;
                isSaving.value = true;
                try {
                    await flushAutosave();
                } catch (error) {
                    messages.value.push(createNoticeMessage(`保存失败：${error.message}`));
                    await nextTick();
                    scrollToBottom();
                } finally {
                    setTimeout(() => { isSaving.value = false; }, 900);
                }
            };

            const triggerUpload = () => {
                if (isModifying.value) return;
                fileInputRef.value?.click();
            };

            const handleUpload = async (event) => {
                const file = event.target.files?.[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('file', file);
                isModifying.value = true;
                try {
                    const response = await fetch(apiUrl('/api/document/upload'), {
                        method: 'POST',
                        body: formData
                    });
                    if (!response.ok) throw new Error(await response.text());
                    const result = await response.json();
                    contentHTML.value = result.htmlContent;
                    documentTitle.value = result.filename || file.name;
                    tiptapEditor.commands.setContent(contentHTML.value);
                    cleanupTemporaryAnchors();
                    ensureTopLevelBlockIds();
                    scheduleDocumentOutlineRefresh();
                    await persistNoteSnapshot({ immediate: true }).catch(() => {});
                    messages.value.push(createNoticeMessage(`已导入 ${documentTitle.value}。`));
                    await nextTick();
                    scrollToBottom();
                } catch (error) {
                    messages.value.push(createNoticeMessage(`导入失败：${error.message}`));
                } finally {
                    isModifying.value = false;
                    event.target.value = '';
                }
            };

            const exportDocument = async (format) => {
                try {
                    const response = await fetch(apiUrl('/api/document/export'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            format,
                            content: contentHTML.value,
                            filename: documentTitle.value.replace(/\.[^.]+$/, '') || 'moss-document'
                        })
                    });
                    if (!response.ok) throw new Error(await response.text());
                    const blob = await response.blob();
                    const disposition = response.headers.get('Content-Disposition') || '';
                    const match = disposition.match(/filename="([^"]+)"/);
                    downloadBlob(blob, match?.[1] || `moss-document.${format === 'markdown' ? 'md' : format}`);
                } catch (error) {
                    messages.value.push(createNoticeMessage(`导出失败：${error.message}`));
                    await nextTick();
                    scrollToBottom();
                }
            };

            const downloadBlob = (blob, filename) => {
                const url = URL.createObjectURL(blob);
                const anchor = document.createElement('a');
                anchor.href = url;
                anchor.download = filename;
                document.body.appendChild(anchor);
                anchor.click();
                anchor.remove();
                URL.revokeObjectURL(url);
            };

            const openAIPopup = () => {
                if (!tiptapEditor) return;
                if (!tiptapEditor.isFocused) tiptapEditor.commands.focus();

                const { from } = tiptapEditor.state.selection;
                const coords = tiptapEditor.view.coordsAtPos(from);
                const popupWidth = 320;

                aiPopupPos.value = {
                    top: Math.min(coords.bottom + 10, window.innerHeight - 64),
                    left: Math.max(16, Math.min(coords.left, window.innerWidth - popupWidth - 16))
                };

                showAIPopup.value = true;
                nextTick(() => {
                    if (aiPopupInputRef.value) aiPopupInputRef.value.focus();
                });
            };

            const closeAIPopup = () => {
                showAIPopup.value = false;
                aiPopupInput.value = '';
                if (tiptapEditor) tiptapEditor.commands.focus();
            };

            const submitAIPopup = () => {
                if (!aiPopupInput.value.trim()) return;
                const cmd = aiPopupInput.value.trim();
                updateLastFocusAnchor();
                closeAIPopup();
                inputText.value = cmd;
                sendMessage();
            };

            const getActiveElementId = () => {
                if (!tiptapEditor) return null;
                const { from, $from } = tiptapEditor.state.selection;
                for (let depth = $from.depth; depth >= 0; depth -= 1) {
                    const node = $from.node(depth);
                    if (node?.attrs?.id) return node.attrs.id;
                }

                let domNode = tiptapEditor.view.domAtPos(from).node;
                if (domNode.nodeType === window.Node.TEXT_NODE) domNode = domNode.parentElement;
                return domNode?.closest?.('[id]')?.id || null;
            };

            const scrollToTarget = (targetId) => {
                const container = document.getElementById('document-container');
                const target = document.getElementById(targetId);
                if (container && target) {
                    container.scrollTo({ top: target.offsetTop - 20, behavior: 'smooth' });
                }
            };

            const highlightTarget = (targetId) => {
                if (!tiptapEditor || !targetId) return;
                let targetPos = null;
                let originalClasses = '';

                tiptapEditor.state.doc.descendants((node, pos) => {
                    if (node.attrs.id === targetId) {
                        targetPos = pos;
                        originalClasses = node.attrs.class || '';
                    }
                });

                if (targetPos !== null) {
                    const node = tiptapEditor.state.doc.nodeAt(targetPos);
                    tiptapEditor.view.dispatch(
                        tiptapEditor.state.tr.setNodeMarkup(targetPos, undefined, {
                            ...node.attrs,
                            class: `${originalClasses} bg-blue-50`.trim()
                        })
                    );

                    setTimeout(() => {
                        const currentNode = tiptapEditor.state.doc.nodeAt(targetPos);
                        if (!currentNode) return;
                        tiptapEditor.view.dispatch(
                            tiptapEditor.state.tr.setNodeMarkup(targetPos, undefined, {
                                ...currentNode.attrs,
                                class: originalClasses
                            })
                        );
                    }, 2000);
                }
            };

            const applyDomMutation = async (mutation) => {
                const targetId = mutation.targetId || mutation.element_id || mutation.target_id;
                const actionType = mutation.action_type || mutation.type || 'replace';
                const newHTML = mutation.new_html || mutation.newHTML || '';
                if (!targetId || !tiptapEditor) return;

                const parser = new DOMParser();
                const doc = parser.parseFromString(`<div data-moss-root>${contentHTML.value}</div>`, 'text/html');
                const root = doc.body.firstElementChild;
                const target = findById(root, targetId);
                const targetWasTopLevel = target?.parentElement === root;

                if (!target && actionType !== 'insert') {
                    messages.value.push(createNoticeMessage(`未找到目标节点：${targetId}`));
                    return;
                }

                const holder = doc.createElement('div');
                holder.innerHTML = newHTML;
                const nodes = Array.from(holder.childNodes);
                const replacementElements = nodes.filter(node => node.nodeType === window.Node.ELEMENT_NODE);
                if (actionType === 'replace' && targetWasTopLevel && replacementElements.length && !replacementElements.some(node => node.id === targetId)) {
                    replacementElements[0].id = targetId;
                }

                if (actionType === 'delete') {
                    target.remove();
                } else if (actionType === 'append') {
                    target.append(...nodes);
                } else if (actionType === 'insert') {
                    if (target) {
                        target.after(...nodes);
                    } else {
                        root.append(...nodes);
                    }
                } else {
                    if (nodes.length) {
                        target.replaceWith(...nodes);
                    }
                }

                contentHTML.value = root.innerHTML;
                tiptapEditor.commands.setContent(contentHTML.value);
                ensureTopLevelBlockIds();
                scheduleDocumentOutlineRefresh();
                await persistNoteSnapshot({ immediate: true }).catch(() => {});

                await nextTick();
                setTimeout(() => {
                    if (actionType !== 'delete') {
                        scrollToTarget(targetId);
                        highlightTarget(targetId);
                    }
                }, 80);
            };

            const findById = (root, id) => {
                const escaped = String(id).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
                return root.querySelector(`[id="${escaped}"]`);
            };

            const outlineIndentClass = (level) => {
                if (level === 2) return 'pl-5';
                if (level === 3) return 'pl-8';
                return 'pl-2';
            };

            const isActiveOutlineItem = (item) => {
                return Boolean(item?.id && item.id === activeOutlineId.value);
            };

            const ensureDocumentOutlineHeadingIds = () => {
                if (!tiptapEditor) return;

                const ids = collectEditorIds();
                const seenHeadingIds = new Set();
                let tr = tiptapEditor.state.tr;

                tiptapEditor.state.doc.descendants((node, pos) => {
                    if (node.type?.name !== 'heading' || !nodeSupportsAttr(node, 'id')) return;

                    const currentId = node.attrs?.id ? String(node.attrs.id) : '';
                    const needsGeneratedId = !currentId
                        || currentId.startsWith(MOSS_TEMP_ANCHOR_PREFIX)
                        || seenHeadingIds.has(currentId);

                    if (!needsGeneratedId) {
                        seenHeadingIds.add(currentId);
                        return;
                    }

                    const nextId = createUniqueEditorId(MOSS_BLOCK_ID_PREFIX, ids);
                    seenHeadingIds.add(nextId);
                    tr = tr.setNodeMarkup(pos, undefined, {
                        ...node.attrs,
                        id: nextId
                    });
                });

                if (!tr.docChanged) return;
                tiptapEditor.view.dispatch(tr);
                contentHTML.value = tiptapEditor.getHTML();
                refreshTopLevelSignature();
            };

            const refreshDocumentOutline = () => {
                outlineScrollSpacerHeight.value = 0;
                const container = document.getElementById('document-container');
                if (!container) {
                    documentOutline.value = [];
                    activeOutlineId.value = '';
                    return;
                }

                ensureDocumentOutlineHeadingIds();

                const headings = Array.from(container.querySelectorAll('h1, h2, h3'));
                const nextOutline = headings
                    .map((heading) => {
                        const level = Number.parseInt(heading.tagName.slice(1), 10);
                        const text = heading.textContent?.trim() || '';
                        const id = heading.id || '';
                        if (!id || !text) return null;
                        return { id, text, level };
                    })
                    .filter(Boolean);

                documentOutline.value = nextOutline;
                if (activeOutlineId.value && !nextOutline.some(item => item.id === activeOutlineId.value)) {
                    activeOutlineId.value = nextOutline[0]?.id || '';
                }
                updateOutlineLayout();
                updateActiveOutline();
            };

            const scheduleDocumentOutlineRefresh = () => {
                if (outlineRefreshFrame) return;
                outlineRefreshFrame = window.requestAnimationFrame(async () => {
                    outlineRefreshFrame = 0;
                    await nextTick();
                    refreshDocumentOutline();
                });
            };

            const updateActiveOutline = () => {
                const container = document.getElementById('document-container');
                if (!container || !documentOutline.value.length) {
                    activeOutlineId.value = '';
                    return;
                }

                const containerRect = container.getBoundingClientRect();
                const activationOffset = 72;
                let activeItem = documentOutline.value[0];

                for (const item of documentOutline.value) {
                    const heading = document.getElementById(item.id);
                    if (!heading) continue;
                    const headingTop = heading.getBoundingClientRect().top - containerRect.top;
                    if (headingTop <= activationOffset) {
                        activeItem = item;
                    } else {
                        break;
                    }
                }

                activeOutlineId.value = activeItem?.id || '';
            };

            const updateOutlineLayout = () => {
                const panelRect = panelRef.value?.getBoundingClientRect?.();
                if (!panelRect) {
                    outlineStyle.value = {
                        left: '1rem',
                        top: '5.5rem',
                        width: '14.75rem',
                        maxHeight: 'calc(100vh - 8rem)',
                        zIndex: 1000
                    };
                    return;
                }

                const pagePadding = 12;
                const preferredOutlineWidth = 236;
                const minOutlineWidth = 196;
                const outlineWidth = Math.min(preferredOutlineWidth, Math.max(minOutlineWidth, window.innerWidth - pagePadding * 2));
                const rightSpace = Math.max(0, window.innerWidth - panelRect.right);
                const hasExternalRightSpace = rightSpace >= outlineWidth + pagePadding * 2;
                const left = hasExternalRightSpace
                    ? panelRect.right + (rightSpace - outlineWidth) / 2
                    : window.innerWidth - outlineWidth - pagePadding;
                const top = 88;
                const bottomLimit = window.innerHeight - 96;
                const maxHeight = Math.max(160, bottomLimit - top);

                outlineStyle.value = {
                    left: `${Math.max(pagePadding, left)}px`,
                    top: `${top}px`,
                    width: `${outlineWidth}px`,
                    maxHeight: `${maxHeight}px`,
                    zIndex: 1000
                };
            };

            const ensureOutlineScrollRoom = async (container, targetTop) => {
                const missingHeight = targetTop + container.clientHeight - container.scrollHeight;
                if (missingHeight <= 0) return;

                outlineScrollSpacerHeight.value += Math.ceil(missingHeight) + 24;
                await nextTick();
            };

            const scrollToOutlineItem = async (item) => {
                if (!item?.id) return;

                const container = document.getElementById('document-container');
                const target = document.getElementById(item.id);
                if (!container || !target) {
                    refreshDocumentOutline();
                    return;
                }

                activeOutlineId.value = item.id;
                const containerRect = container.getBoundingClientRect();
                const targetTop = container.scrollTop + target.getBoundingClientRect().top - containerRect.top - 24;
                await ensureOutlineScrollRoom(container, targetTop);
                container.scrollTo({
                    top: Math.max(0, targetTop),
                    behavior: 'smooth'
                });
            };

            const openDocumentOutline = () => {
                showDocumentOutline.value = true;
                refreshDocumentOutline();
            };

            const closeDocumentOutline = () => {
                showDocumentOutline.value = false;
            };

            const toggleDocumentOutline = () => {
                if (showDocumentOutline.value) {
                    closeDocumentOutline();
                    return;
                }
                openDocumentOutline();
            };

            const handleConversationMenuPointerDown = (event) => {
                if (!openConversationMenuId.value) return;
                const target = event.target;
                if (target?.closest?.('.conversation-dropdown-menu')) return;
                if (conversationTreePanelRef.value?.contains?.(target)) return;
                closeConversationMenu();
            };

            const handleKeyDown = (e) => {
                const activeTag = document.activeElement?.tagName;
                const isInputFocused = activeTag === 'INPUT' || activeTag === 'TEXTAREA';

                if (e.key === 'Escape' && openConversationMenuId.value) {
                    closeConversationMenu();
                    return;
                }

                if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
                    e.preventDefault();
                    saveContent();
                }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'f' || e.key === 'F')) {
                    e.preventDefault();
                    toggleFullScreen();
                }

                if (isInputFocused && !showAIPopup.value) return;
                if (!tiptapEditor) return;

                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    openAIPopup();
                }

                if ((e.ctrlKey || e.metaKey) && e.key >= '1' && e.key <= '6') {
                    e.preventDefault();
                    tiptapEditor.commands.toggleHeading({ level: parseInt(e.key, 10) });
                }

                if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
                    e.preventDefault();
                    if (tiptapEditor.isActive('heading')) {
                        const currentLevel = tiptapEditor.getAttributes('heading').level;
                        if (currentLevel > 1) tiptapEditor.commands.setHeading({ level: currentLevel - 1 });
                    } else {
                        tiptapEditor.commands.setHeading({ level: 6 });
                    }
                }

                if ((e.ctrlKey || e.metaKey) && e.key === '-') {
                    e.preventDefault();
                    if (tiptapEditor.isActive('heading')) {
                        const currentLevel = tiptapEditor.getAttributes('heading').level;
                        if (currentLevel < 6) {
                            tiptapEditor.commands.setHeading({ level: currentLevel + 1 });
                        } else {
                            tiptapEditor.commands.setParagraph();
                        }
                    }
                }
            };

            const sendMessage = async (explicitFocusId = null) => {
                if (!inputText.value.trim() || isModifying.value) return;

                const currentInput = inputText.value.trim();
                let requestAnchors = null;
                resetWaitingStages();
                messages.value.push({ role: 'user', content: currentInput });
                inputText.value = '';
                await nextTick();
                adjustInputTextareaHeight();
                scrollToBottom();

                isThinking.value = true;
                isModifying.value = true;
                let aiIndex = -1;
                let noticeGenerated = false;
                let pendingTaskType = '';

                const ensureAiMessage = async () => {
                    if (aiIndex >= 0) return;
                    messages.value.push(createAnswerMessage('', pendingTaskType));
                    aiIndex = messages.value.length - 1;
                    isThinking.value = false;
                    await nextTick();
                };

                try {
                    if (!currentNoteId.value || !currentConversationId.value) {
                        const draftSnapshot = tiptapEditor ? tiptapEditor.getHTML() : contentHTML.value;
                        contentHTML.value = draftSnapshot;
                    }
                    requestAnchors = prepareAgentRequestAnchors(explicitFocusId);
                    await ensurePersistedNote(requestAnchors.canvasSnapshot, { allowBlank: true });
                    const response = await fetch(apiUrl('/api/v1/chat-stream'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: sessionId,
                            note_id: currentNoteId.value,
                            conversation_id: currentConversationId.value,
                            user_input: currentInput,
                            focus_element_id: requestAnchors.focusElementId,
                            focus_block_id: requestAnchors.focusBlockId,
                            canvas_snapshot: requestAnchors.canvasSnapshot
                        })
                    });

                    if (!response.ok || !response.body) {
                        throw new Error(await response.text());
                    }

                    await readEventStream(response, async ({ event, data }) => {
                        if (event === 'conversation' && data.conversation_id) {
                            setCurrentConversationId(data.conversation_id);
                        }

                        if (event === 'node_start') {
                            startWaitingStage(data.node);
                        }

                        if (event === 'node_end') {
                            completeWaitingStage(data.node);
                        }

                        if (event === 'node_end' && data.node === 'intent') {
                            const taskType = normalizeTaskType(data.output?.task_type);
                            if (taskType) {
                                pendingTaskType = taskType;
                                if (aiIndex >= 0) {
                                    messages.value[aiIndex].taskType = taskType;
                                }
                            }
                        }

                        if (event === 'chat_chunk') {
                            await ensureAiMessage();
                            messages.value[aiIndex].content += data.content || '';
                            await nextTick();
                            scrollToBottom();
                        }

                        if (event === 'dom_mutation') {
                            isDocumentModifying.value = true;
                            await applyDomMutation(data);
                        }

                        if (event === 'error') {
                            const message = data.message || '服务端处理失败';
                            if (aiIndex >= 0) {
                                messages.value[aiIndex].content += `\n${message}`;
                            } else {
                                messages.value.push(createNoticeMessage(message));
                                noticeGenerated = true;
                            }
                        }
                    });

                    if (aiIndex < 0 && !noticeGenerated) {
                        messages.value.push(createNoticeMessage('处理完成。'));
                    }
                } catch (error) {
                    if (aiIndex < 0) {
                        messages.value.push(createNoticeMessage(`连接失败：${error.message}`));
                    } else {
                        messages.value[aiIndex].content = `连接失败：${error.message}`;
                    }
                } finally {
                    if (requestAnchors?.tempAnchorId) {
                        cleanupTemporaryAnchors(requestAnchors.tempAnchorId);
                        ensureTopLevelBlockIds();
                    }
                    isDocumentModifying.value = false;
                    isThinking.value = false;
                    isModifying.value = false;
                    resetWaitingStages();
                    if (currentNoteId.value) {
                        await loadNoteConversations().catch(() => {});
                    }
                    await nextTick();
                    scrollToBottom();
                }
            };

            const readEventStream = async (response, onEvent) => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    let boundary = buffer.indexOf('\n\n');
                    while (boundary !== -1) {
                        const frame = buffer.slice(0, boundary);
                        buffer = buffer.slice(boundary + 2);
                        const parsed = parseSseFrame(frame);
                        if (parsed) await onEvent(parsed);
                        boundary = buffer.indexOf('\n\n');
                    }
                }
            };

            const parseSseFrame = (frame) => {
                let event = 'message';
                const dataLines = [];
                for (const line of frame.split(/\r?\n/)) {
                    if (line.startsWith('event:')) event = line.slice(6).trim();
                    if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart());
                }
                if (!dataLines.length) return { event, data: {} };
                try {
                    return { event, data: JSON.parse(dataLines.join('\n')) };
                } catch {
                    return { event, data: { content: dataLines.join('\n') } };
                }
            };

            const toggleFullScreen = async () => {
                isFullScreen.value = !isFullScreen.value;
                await nextTick();
                if (currentNoteId.value) updateConversationTreePosition();
                updateOutlineLayout();
                updateActiveOutline();
            };

            const startDragging = (e) => {
                if (isFullScreen.value) return;

                e.preventDefault();
                window.getSelection?.().removeAllRanges();

                isDragging.value = true;
                startY.value = e.clientY;
                startHeight.value = panelHeight.value;
                document.addEventListener('mousemove', handleDragging);
                document.addEventListener('mouseup', stopDragging);
            };

            const handleDragging = (e) => {
                if (!isDragging.value) return;
                let newHeight = startHeight.value + (e.clientY - startY.value);
                const minHeight = 240;
                const maxHeight = window.innerHeight - 150;
                if (newHeight < minHeight) newHeight = minHeight;
                if (newHeight > maxHeight) newHeight = maxHeight;
                panelHeight.value = newHeight;
                if (currentNoteId.value) updateConversationTreePosition();
                updateOutlineLayout();
            };

            const stopDragging = () => {
                isDragging.value = false;
                document.removeEventListener('mousemove', handleDragging);
                document.removeEventListener('mouseup', stopDragging);
            };

            const handleResize = () => {
                const maxHeight = window.innerHeight - 150;
                if (panelHeight.value > maxHeight) panelHeight.value = maxHeight;
                if (currentNoteId.value) updateConversationTreePosition();
                const openConversation = noteConversations.value.find(item => item.conversation_id === openConversationMenuId.value);
                if (openConversation) updateConversationMenuPosition(openConversation);
                adjustInputTextareaHeight();
                updateOutlineLayout();
                updateActiveOutline();
            };

            const openLibrary = async () => {
                try {
                    await flushAutosave();
                } catch {}
                window.location.href = '/library';
            };

            onMounted(async () => {
                try {
                    try {
                        await loadCurrentNote();
                    } catch (error) {
                        noteLoadError.value = error.message || '加载笔记失败';
                        messages.value.push(createNoticeMessage(`加载笔记失败：${noteLoadError.value}`));
                        contentHTML.value = '<p></p>';
                    }

                    tiptapEditor = new Editor({
                        element: editorContainer.value,
                        extensions: [
                            StarterKit,
                            CustomDiv,
                            GlobalAttributes
                        ],
                        content: contentHTML.value,
                        editorProps: {
                            attributes: {
                                spellcheck: 'false',
                            },
                            handlePaste: () => {
                                window.setTimeout(() => {
                                    ensureTopLevelBlockIds();
                                    updateLastFocusAnchor();
                                }, 0);
                                return false;
                            }
                        },
                        onSelectionUpdate: () => {
                            updateLastFocusAnchor();
                        },
                        onUpdate: ({ editor }) => {
                            contentHTML.value = editor.getHTML();
                            if (!isMaintainingDocumentIds) {
                                queueAutosave();
                                const signature = topLevelStructureSignature();
                                if (signature !== lastTopLevelSignature) {
                                    lastTopLevelSignature = signature;
                                    queueTopLevelIdMaintenance();
                                }
                            }
                            scheduleDocumentOutlineRefresh();
                        }
                    });
                    cleanupTemporaryAnchors();
                    ensureTopLevelBlockIds();
                    refreshTopLevelSignature();

                    await nextTick();
                    adjustInputTextareaHeight();
                    refreshDocumentOutline();

                    const documentContainer = document.getElementById('document-container');
                    if (documentContainer) documentContainer.addEventListener('scroll', updateActiveOutline, { passive: true });
                    document.addEventListener('pointerdown', handleConversationMenuPointerDown);
                    window.addEventListener('keydown', handleKeyDown);
                    window.addEventListener('resize', handleResize);
                } finally {
                    hideInitialLoading();
                }
            });

            onUnmounted(() => {
                window.removeEventListener('keydown', handleKeyDown);
                window.removeEventListener('resize', handleResize);
                const documentContainer = document.getElementById('document-container');
                documentContainer?.removeEventListener('scroll', updateActiveOutline);
                document.removeEventListener('pointerdown', handleConversationMenuPointerDown);
                document.removeEventListener('mousemove', handleDragging);
                document.removeEventListener('mouseup', stopDragging);
                if (autosaveTimer) window.clearTimeout(autosaveTimer);
                if (outlineRefreshFrame) window.cancelAnimationFrame(outlineRefreshFrame);
                tiptapEditor?.destroy();
            });

            return {
                inputText,
                inputTextareaRef,
                adjustInputTextareaHeight,
                allowTextareaNewline,
                messages,
                contentHTML,
                isModifying,
                isDocumentModifying,
                isThinking,
                waitingStages,
                panelHeight,
                sendMessage,
                chatPaddingTop,
                isDragging,
                startDragging,
                isFullScreen,
                toggleFullScreen,
                editorContainer,
                documentBodyRef,
                fileInputRef,
                libraryButtonRef,
                panelRef,
                outlinePanelRef,
                isSaving,
                saveContent,
                triggerUpload,
                handleUpload,
                exportDocument,
                showAIPopup,
                aiPopupPos,
                aiPopupInput,
                aiPopupInputRef,
                submitAIPopup,
                closeAIPopup,
                documentTitle,
                currentNoteId,
                setCurrentNoteId,
                currentConversationId,
                setCurrentConversationId,
                noteConversations,
                isLoadingConversations,
                isCreatingConversation,
                isRenamingConversation,
                isConversationActionBusy,
                editingConversationId,
                renameConversationDraft,
                conversationError,
                hoveredConversationId,
                openConversationMenuId,
                deleteConversationTarget,
                conversationMenuStyle,
                showConversationTree,
                conversationTreeRef,
                conversationTreePanelRef,
                conversationTreeStyle,
                isConversationTreeCompact,
                documentOutline,
                activeOutlineId,
                showDocumentOutline,
                outlineScrollSpacerHeight,
                outlineStyle,
                outlineIndentClass,
                isActiveOutlineItem,
                openDocumentOutline,
                closeDocumentOutline,
                toggleDocumentOutline,
                scrollToOutlineItem,
                openConversationTree,
                toggleConversationTree,
                closeConversationTree,
                createConversation,
                switchConversation,
                startRenameConversation,
                cancelRenameConversation,
                saveConversationTitle,
                toggleConversationPinned,
                startDeleteConversation,
                cancelDeleteConversation,
                confirmDeleteConversation,
                conversationTitle,
                currentConversationTitle,
                isCurrentConversation,
                conversationStatusIcon,
                conversationActionIcon,
                handleConversationRowLeave,
                toggleConversationMenu,
                saveStatus,
                noteLoadError,
                openLibrary,
                renderMarkdown,
                isAnswerMessage,
                getTaskTypeLabel,
                copyMessage,
                copiedMessageIndex
            };
        }
    }).mount('#app');
</script>
</body>
</html>
